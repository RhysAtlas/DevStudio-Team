<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevStudio Team</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER do menu -->
  <header>
    <h1>DevStudio</h1>
    <nav>
      <a href="#home">Home</a>
      <a href="#about">Quem Somos</a>
      <a href="#services">Serviços</a>
      <a href="#projects">Projetos</a>
      <a href="#contact">Contato</a>
    </nav>
  </header>

  <!-- HOME -->
  <section id="home" class="section">
    <h2>Transformando ideias em realidade</h2>
    <p>Equipe focada em desenvolvimento front-end moderno.</p>
    <button onclick="scrollToSection('contact')">Fale Conosco</button>
  </section>

  <!-- QUEM SOMOS -->
  <section id="about" class="section">
    <h2>Quem Somos</h2>
    <div class="cards">
      <div class="card">Daniel</div>
      <div class="card">Stéffano</div>
      <div class="card">José Armendes</div>
    </div>
  </section>

  <!-- Serviços -->
  <section id="services" class="section">
    <h2>Serviços</h2>
    <div class="cards">
      <div class="card">Criação de Sites</div>
      <div class="card">UI/UX Design</div>
      <div class="card">Front-End</div>
    </div>
  </section>

  <!-- Projetos -->
  <section id="projects" class="section">
    <h2>Projetos</h2>
    <div class="cards">
      <div class="card"><img src=https://s.tmimgcdn.com/scr/1200x627/298600/poket-modelo-de-site-responsivo-de-portfolio-pessoal_298663-original.jpg width="150"></div>
      <div class="card"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTfH-GBOP4-jon8bVeTLK8mwh1DD1HX5FH9RA&s" width="150"></div>
      <div class="card"><img src="https://elementor.com/blog/wp-content/uploads/2024/05/image-65.png" width="150"></div>
    </div>
  </section>

  <!-- Contatos -->
  <section id="contact" class="section">
    <h2>Contato</h2>
    <form id="form">
      <input type="text" id="nome" placeholder="Seu nome">
      <input type="email" id="email" placeholder="Seu email">
      <textarea id="mensagem" placeholder="Mensagem"></textarea>
      <button type="submit">Enviar</button>
    </form>
  </section>

  <!-- Botão para direcionar ao topo -->
  <button id="topBtn">↑</button>

  <script src="script.js"></script>
</body>
</html>
